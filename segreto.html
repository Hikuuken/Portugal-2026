<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Segreto</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:#0f1114;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    .wrap{
      width:min(100vw, 1100px);
      padding:18px;
      text-align:center;
    }
    a{
      display:inline-block;
      text-decoration:none;
    }
    img{
      display:block;
      max-width:100%;
      max-height:calc(100vh - 36px);
      width:auto;
      height:auto;
      margin:0 auto;
      border-radius:20px;
      box-shadow:0 18px 60px rgba(0,0,0,.45);
      cursor:pointer;
    }
    .hint{
      margin-top:14px;
      color:rgba(255,255,255,.55);
      font-size:.9rem;
      letter-spacing:.02em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a id="backLink" href="index.html" aria-label="Torna alla pagina precedente">
      <img src="assets/img/goblin-avarizia-lisbona.png" alt="Creatura dell'avarizia a Lisbona" />
    </a>
    <div class="hint">clicca l’immagine per tornare indietro</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const from = params.get("from");
    const backLink = document.getElementById("backLink");

    if (from && /^[a-z0-9_-]+\.html$/i.test(from)) {
      backLink.href = from;
    } else {
      backLink.href = "index.html";
    }
  </script>
</body>
</html>
